<text x="240" y="380">2040</text>
<text x="400" y="380">2060</text>
<text x="560" y="380">2080</text>
<text x="720" y="380">2100</text>
</g>

<text x="40" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#5F5E5A">°C above 1991–2020</text>

