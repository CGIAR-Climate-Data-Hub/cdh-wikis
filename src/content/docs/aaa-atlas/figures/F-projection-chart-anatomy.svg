<polygon points="80,320 160,297.5 240,272.5 320,247.5 400,227.5 480,210 560,197.5 640,182.5 720,172.5 720,277.5 640,282.5 560,292.5 480,300 400,307.5 320,317.5 240,327.5 160,337.5 80,350" fill="#85B7EB" fill-opacity="0.55" stroke="none"/>

