<line x1="80" y1="60" x2="80" y2="360" stroke="#2C2C2A" stroke-width="1"/>

<g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12">
<rect x="540" y="395" width="14" height="3" fill="#854F0B"/>
