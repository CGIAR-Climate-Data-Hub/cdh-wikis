<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1" preserveAspectRatio="xMidYMid meet">
<title id="t1">Anatomy of a projection chart</title>
<desc id="d1">Schematic time series from 2020 to 2100 showing two CMIP6 scenario bands. Each band has a thick central mean line inside a shaded envelope representing the 17 to 83 percent inter-model spread. The two bands overlap heavily before 2050 and diverge by 2100. Four callouts label the ensemble mean, the inter-model spread, the scenario uncertainty between bands, and the near-term region where internal variability dominates.</desc>

<rect x="80" y="60" width="640" height="300" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>

<g stroke="#D3D1C7" stroke-width="0.5">
<line x1="80" y1="110" x2="720" y2="110"/>
<line x1="80" y1="160" x2="720" y2="160"/>
<line x1="80" y1="210" x2="720" y2="210"/>
<line x1="80" y1="260" x2="720" y2="260"/>
<line x1="80" y1="310" x2="720" y2="310"/>
</g>

<g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#5F5E5A" text-anchor="end">
<text x="72" y="64">6</text>
<text x="72" y="114">5</text>
<text x="72" y="164">4</text>
<text x="72" y="214">3</text>
<text x="72" y="264">2</text>
