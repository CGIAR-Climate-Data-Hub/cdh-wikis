<g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#2C2C2A">
<text x="100" y="92">Ensemble mean</text>
<text x="100" y="106" font-size="11" fill="#5F5E5A">central line through model average</text>

<text x="370" y="82">Inter-model spread</text>
<text x="370" y="96" font-size="11" fill="#5F5E5A">17–83% range across models</text>

