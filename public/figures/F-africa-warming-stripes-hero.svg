<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1" preserveAspectRatio="xMidYMid meet">
<title id="t1">Africa is warming — annual continental temperature anomaly, 1880–2025, vs 1991–2020</title>
<desc id="d1">Animated warming-stripes chart of African continental annual temperature anomaly from 1880 to 2025 relative to the 1991–2020 baseline. Each vertical stripe represents one year, coloured from deep blue for cool anomalies to dark red for warm anomalies. The stripes wipe in from left to right over the first six seconds, revealing the gradual shift from blue early-twentieth-century stripes through neutral mid-century stripes to increasingly red stripes from the 1980s onward.</desc>
<defs><clipPath id="reveal"><rect x="80" y="80" height="200"><animate attributeName="width" values="0;640;640" keyTimes="0;0.62;1" dur="8s" repeatCount="indefinite" fill="freeze" calcMode="linear" /></rect></clipPath></defs>
<text x="80" y="50" font-family="'Noto Serif',Georgia,serif" font-size="22" font-weight="700" fill="#033529">Africa is warming.</text>
<text x="80" y="70" font-family="'Noto Sans',system-ui,sans-serif" font-size="13" fill="#5F5E5A">Annual continental temperature anomaly, 1880–2025 (vs 1991–2020 baseline).</text>
